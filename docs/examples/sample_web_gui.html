<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cop &amp; Thief — Web GUI</title>
<style>
  body{font-family:system-ui,Segoe UI,sans-serif;margin:1.5rem;background:#0f1320;color:#e8ecf4}
  h1{font-size:1.25rem;margin:.2rem 0} h3{margin:.2rem 0 .5rem}
  .row{display:flex;gap:1.5rem;flex-wrap:wrap;align-items:flex-start}
  .panel{background:#1a2032;border:1px solid #2a3350;border-radius:10px;padding:1rem}
  table{border-collapse:collapse} td{width:36px;height:36px;text-align:center;border:1px solid #2a3350;font-weight:700}
  .C{background:#2563eb;color:#fff}.T{background:#dc2626;color:#fff}.B{background:#0a0d16;color:#5b6788}
  .E{background:#0c1322}.U{background:#1b2236;color:#55617f}
  .controls{margin:1rem 0;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
  input[type=range]{width:260px} select,button{font-size:1rem;background:#243049;color:#e8ecf4;border:1px solid #3a4a6b;border-radius:6px;padding:.25rem .5rem}
  button{cursor:pointer} .scores{font-size:1.1rem;margin:.5rem 0}
  .log{max-height:160px;overflow:auto;font-family:ui-monospace,monospace;font-size:.82rem;line-height:1.5}
  .muted{color:#8b96b3}
</style>
</head>
<body>
<h1>Cop &amp; Thief — Web GUI <span class="muted">(local replay)</span></h1>
<div class="controls">
  <label>Sub-game <select id="sub"></select></label>
  <label>Move <input type="range" id="move" min="0" value="0"></label>
  <span id="movelbl" class="muted"></span>
  <button id="play">▶ Play</button>
</div>
<div class="scores" id="scores"></div>
<div class="row">
  <div class="panel"><h3>True board</h3><table id="board"></table></div>
  <div class="panel"><h3 id="fogtitle">Fog-of-war</h3><table id="fog"></table>
    <p class="muted">C=cop · T=thief · ▦=barrier · ?=unseen</p></div>
  <div class="panel"><h3>Turn</h3><div id="turn"></div>
    <h3 style="margin-top:1rem">Series totals</h3><div id="totals"></div></div>
</div>
<div class="panel" style="margin-top:1rem"><h3>Message / action log</h3><div class="log" id="log"></div></div>
<script>
const DATA = {"grid_size": [5, 5], "totals": {"cop": 20, "thief": 5}, "sub_games": [{"index": 1, "winner": "cop", "cop_score": 20, "thief_score": 5, "moves_played": 4, "turns": [{"move": 0, "role": "thief", "message": "Thief slipping toward [0, 0].", "action": {"type": "move", "to": [1, 1]}, "board": [[".", ".", ".", ".", "."], [".", "T", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", "C", ".", "."]], "fog": [["T", ".", ".", "?", "?"], [".", ".", ".", "?", "?"], [".", ".", ".", "?", "?"], ["?", "?", "?", "?", "?"], ["?", "?", "?", "?", "?"]]}, {"move": 1, "role": "cop", "message": "Cop closing in toward [3, 1].", "action": {"type": "move", "to": [3, 1]}, "board": [[".", ".", ".", ".", "."], [".", "T", ".", ".", "."], [".", ".", ".", ".", "."], [".", "C", ".", ".", "."], [".", ".", ".", ".", "."]], "fog": [["?", "?", "?", "?", "?"], ["?", "?", "?", "?", "?"], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", "C", ".", "."]]}, {"move": 1, "role": "thief", "message": "Thief slipping toward [4, 0].", "action": {"type": "move", "to": [0, 0]}, "board": [["T", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", "C", ".", ".", "."], [".", ".", ".", ".", "."]], "fog": [[".", ".", ".", ".", "?"], [".", "T", ".", ".", "?"], [".", ".", ".", ".", "?"], [".", "C", ".", ".", "?"], ["?", "?", "?", "?", "?"]]}, {"move": 2, "role": "cop", "message": "Cop closing in toward [2, 2].", "action": {"type": "move", "to": [2, 2]}, "board": [["T", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", "C", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."]], "fog": [["?", "?", "?", "?", "?"], [".", ".", ".", ".", "?"], [".", ".", ".", ".", "?"], [".", "C", ".", ".", "?"], [".", ".", ".", ".", "?"]]}, {"move": 2, "role": "thief", "message": "Thief slipping toward [4, 0].", "action": {"type": "move", "to": [0, 1]}, "board": [[".", "T", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", "C", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."]], "fog": [["T", ".", ".", "?", "?"], [".", ".", ".", "?", "?"], [".", ".", "C", "?", "?"], ["?", "?", "?", "?", "?"], ["?", "?", "?", "?", "?"]]}, {"move": 3, "role": "cop", "message": "Cop closing in toward [1, 1].", "action": {"type": "move", "to": [1, 1]}, "board": [[".", "T", ".", ".", "."], [".", "C", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."]], "fog": [[".", "T", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", "C", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."]]}, {"move": 3, "role": "thief", "message": "Thief slipping toward [4, 0].", "action": {"type": "move", "to": [0, 0]}, "board": [["T", ".", ".", ".", "."], [".", "C", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."]], "fog": [[".", "T", ".", ".", "?"], [".", "C", ".", ".", "?"], [".", ".", ".", ".", "?"], ["?", "?", "?", "?", "?"], ["?", "?", "?", "?", "?"]]}, {"move": 4, "role": "cop", "message": "Cop closing in toward [0, 0].", "action": {"type": "move", "to": [0, 0]}, "board": [["C", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."], [".", ".", ".", ".", "."]], "fog": [["T", ".", ".", ".", "?"], [".", "C", ".", ".", "?"], [".", ".", ".", ".", "?"], [".", ".", ".", ".", "?"], ["?", "?", "?", "?", "?"]]}]}]};
const CLS = {C:'C', T:'T', '#':'B', '.':'E', '?':'U'};
function draw(el, cells){
  el.innerHTML='';
  for(const row of cells){
    const tr=document.createElement('tr');
    for(const ch of row){
      const td=document.createElement('td');
      td.textContent=(ch==='.'||ch==='?')?'':(ch==='#'?'▦':ch);
      td.className=CLS[ch]||'E'; tr.appendChild(td);
    }
    el.appendChild(tr);
  }
}
const $=id=>document.getElementById(id);
function curSub(){ return DATA.sub_games[+$('sub').value]; }
function render(){
  const sg=curSub(); const mv=+$('move').value; const t=sg.turns[mv];
  draw($('board'), t.board); draw($('fog'), t.fog);
  $('fogtitle').textContent='Fog-of-war ('+t.role+')';
  $('movelbl').textContent=(mv+1)+' / '+sg.turns.length;
  $('turn').innerHTML='<b>role:</b> '+t.role+'<br><b>action:</b> '+JSON.stringify(t.action)+
    '<br><b>message:</b> '+t.message;
  $('scores').innerHTML='Sub-game '+sg.index+' — winner <b>'+sg.winner+'</b> '+
    '(cop '+sg.cop_score+' / thief '+sg.thief_score+')';
  $('log').innerHTML=sg.turns.slice(0,mv+1).map(x=>
    '['+x.move+' '+x.role+'] '+x.message+'  →  '+JSON.stringify(x.action)).join('<br>');
  $('totals').innerHTML='cop '+DATA.totals.cop+' / thief '+DATA.totals.thief;
}
function initSub(){
  const sel=$('sub'); sel.innerHTML='';
  DATA.sub_games.forEach((sg,i)=>{ const o=document.createElement('option');
    o.value=i; o.textContent='Sub-game '+sg.index+' ('+sg.winner+')'; sel.appendChild(o); });
}
function setMoveMax(){ const sg=curSub(); const m=$('move'); m.max=Math.max(0,sg.turns.length-1); m.value=0; }
$('sub').addEventListener('change',()=>{ setMoveMax(); render(); });
$('move').addEventListener('input',render);
let timer=null;
$('play').addEventListener('click',()=>{
  if(timer){ clearInterval(timer); timer=null; return; }
  const m=$('move');
  timer=setInterval(()=>{ if(+m.value>=+m.max){ clearInterval(timer); timer=null; return; }
    m.value=+m.value+1; render(); }, 600);
});
initSub(); setMoveMax(); render();
</script>
</body>
</html>
